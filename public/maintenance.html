<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Dār al-Ḥaqq — temporarily down</title>
  <style>
    :root {
      --bg-paper: #f9f5ec;
      --rule-warm: #d8cfb8;
      --ink-primary: #181818;
      --ink-secondary: #5a5040;
      --ink-tertiary: #6b5f4c;
      --navy: #1f2c4a;
      --gold: #c9a14a;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-paper);
      color: var(--ink-primary);
      font-family: 'Source Serif 4', Charter, Georgia, 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      box-sizing: border-box;
    }
    .wrap {
      max-width: 480px;
      text-align: center;
    }
    .ar {
      font-family: 'Amiri', 'Noto Naskh Arabic', 'Times New Roman', serif;
      direction: rtl;
      font-size: 36px;
      color: var(--navy);
      font-weight: 700;
      margin: 0 0 6px;
      line-height: 1.05;
    }
    .en {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
      font-size: 26px;
      color: var(--navy);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 22px;
    }
    .pattern {
      height: 4px;
      margin: 0 auto 22px;
      max-width: 320px;
      background: repeating-linear-gradient(90deg, var(--gold) 0, var(--gold) 6px, transparent 6px, transparent 12px);
    }
    .msg {
      font-style: italic;
      color: var(--ink-secondary);
      font-size: 16px;
      line-height: 1.55;
      margin: 0 0 8px;
    }
    .small {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-tertiary);
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="ar">دار الحق</p>
    <p class="en">Dār al-Ḥaqq</p>
    <div class="pattern"></div>
    <p class="msg">The site is temporarily down for maintenance.</p>
    <p class="msg">Please check back soon, in shāʾa Allāh.</p>
    <p class="small">Status · maintenance</p>
  </div>
</body>
</html>
